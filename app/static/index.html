<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeTransfer Clon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        background: #16213e;
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
        color: #e94560;
      }

      p.subtitle {
        color: #aaa;
        margin-bottom: 32px;
        font-size: 0.95rem;
      }

      .google-btn {
        width: 100%;
        padding: 14px;
        background: white;
        color: #333;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 500;
        transition: background 0.2s;
      }

      .google-btn:hover {
        background: #f0f0f0;
      }

      .google-btn img {
        width: 20px;
      }

      .user-info {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        padding: 12px;
        background: #0f3460;
        border-radius: 8px;
      }

      .user-info span {
        font-size: 0.85rem;
        color: #aaa;
      }

      .logout-btn {
        padding: 6px 12px;
        background: transparent;
        color: #e94560;
        border: 1px solid #e94560;
        border-radius: 6px;
        font-size: 0.8rem;
        cursor: pointer;
        width: auto;
      }

      .drop-zone {
        border: 2px dashed #e94560;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 20px;
      }

      .drop-zone:hover {
        background: rgba(233, 69, 96, 0.05);
      }
      .drop-zone input {
        display: none;
      }
      .drop-zone p {
        color: #aaa;
        font-size: 0.9rem;
        margin-top: 8px;
      }
      .drop-zone .icon {
        font-size: 2.5rem;
      }

      #file-name {
        color: #e94560;
        font-size: 0.9rem;
        margin-bottom: 16px;
        min-height: 20px;
      }

      .upload-btn {
        width: 100%;
        padding: 14px;
        background: #e94560;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      .upload-btn:hover {
        background: #c73652;
      }
      .upload-btn:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .result {
        margin-top: 24px;
        background: #0f3460;
        border-radius: 8px;
        padding: 20px;
        display: none;
      }

      .result p {
        font-size: 0.85rem;
        color: #aaa;
        margin-bottom: 8px;
      }
      .result a {
        color: #e94560;
        word-break: break-all;
        font-size: 0.9rem;
      }
      .result .info {
        margin-top: 12px;
        font-size: 0.8rem;
        color: #888;
      }

      .copy-btn {
        margin-top: 12px;
        padding: 8px;
        font-size: 0.85rem;
        background: #0f3460;
        border: 1px solid #e94560;
        color: white;
        width: 100%;
        border-radius: 6px;
        cursor: pointer;
      }

      .copy-btn:hover {
        background: #1a4a7a;
      }

      .error {
        margin-top: 16px;
        color: #e94560;
        font-size: 0.9rem;
        display: none;
      }

      .login-section {
        text-align: center;
      }
      .login-section p {
        color: #aaa;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }

      #upload-section {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>WeTransfer Clon</h1>
      <p class="subtitle">
        Sube archivos y comparte enlaces. Expiran en 12 horas.
      </p>

      <!-- Login -->
      <div class="login-section" id="login-section">
        <p>Inicia sesión para subir archivos</p>
        <button class="google-btn" onclick="loginWithGoogle()">
          <img src="https://www.google.com/favicon.ico" alt="Google" />
          Continuar con Google
        </button>
      </div>

      <!-- Upload -->
      <div id="upload-section">
        <div class="user-info">
          <span id="user-email"></span>
          <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
        </div>

        <div
          class="drop-zone"
          onclick="document.getElementById('file-input').click()"
        >
          <div class="icon">📁</div>
          <p>Haz clic para seleccionar un archivo</p>
          <input
            type="file"
            id="file-input"
            onchange="handleFileSelect(this)"
          />
        </div>

        <div id="file-name"></div>

        <button
          class="upload-btn"
          id="upload-btn"
          onclick="uploadFile()"
          disabled
        >
          Subir archivo
        </button>

        <div class="result" id="result">
          <p>Enlace de descarga:</p>
          <a id="download-link" href="#" target="_blank"></a>
          <button class="copy-btn" onclick="copyLink()">Copiar enlace</button>
          <div class="info" id="expiry-info"></div>
        </div>

        <div class="error" id="error-msg"></div>
      </div>
    </div>

    <script>
      // Variables globales
      let SUPABASE_URL, SUPABASE_KEY, client;
      let currentSession = null;
      let selectedFile = null;

      async function loadConfig() {
        const res = await fetch("/config");
        const config = await res.json();
        SUPABASE_URL = config.supabase_url;
        SUPABASE_KEY = config.supabase_key;
        const { createClient } = supabase;
        client = createClient(SUPABASE_URL, SUPABASE_KEY);
        await init();
      }

      loadConfig();

      // Verificar sesión al cargar
      async function init() {
        const {
          data: { session },
        } = await client.auth.getSession();
        if (session) {
          currentSession = session;
          showUploadSection(session.user.email);
        }

        // Manejar callback de OAuth
        client.auth.onAuthStateChange((event, session) => {
          if (event === "SIGNED_IN" && session) {
            currentSession = session;
            showUploadSection(session.user.email);
          } else if (event === "SIGNED_OUT") {
            currentSession = null;
            showLoginSection();
          }
        });
      }

      async function loginWithGoogle() {
        await client.auth.signInWithOAuth({
          provider: "google",
          options: {
            redirectTo: window.location.origin,
          },
        });
      }

      async function logout() {
        await client.auth.signOut();
      }

      function showUploadSection(email) {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("upload-section").style.display = "block";
        document.getElementById("user-email").textContent = email;
      }

      function showLoginSection() {
        document.getElementById("login-section").style.display = "block";
        document.getElementById("upload-section").style.display = "none";
      }

      function handleFileSelect(input) {
        selectedFile = input.files[0];
        if (selectedFile) {
          document.getElementById("file-name").textContent =
            `Archivo: ${selectedFile.name}`;
          document.getElementById("upload-btn").disabled = false;
        }
      }

      // Función para subir el archivo al servidor
      async function uploadFile() {
        if (!selectedFile || !currentSession) return;

        // --- NUEVA VALIDACIÓN DE TAMAÑO ---
        // 50 MB expresados en bytes (1 MB = 1024 * 1024 bytes)
        const MAX_SIZE_BYTES = 50 * 1024 * 1024;

        if (selectedFile.size > MAX_SIZE_BYTES) {
          document.getElementById("error-msg").textContent =
            "El archivo excede el tamaño máximo permitido de 50MB.";
          document.getElementById("error-msg").style.display = "block";
          document.getElementById("result").style.display = "none";
          return; // Detiene la ejecución aquí, no hace la petición al servidor
        }
        // ----------------------------------

        // Deshabilitar botón y mostrar estado de subida
        const btn = document.getElementById("upload-btn");
        btn.disabled = true;
        btn.textContent = "Subiendo...";

        document.getElementById("error-msg").style.display = "none";
        document.getElementById("result").style.display = "none";

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
          const response = await fetch("/upload", {
            method: "POST",
            headers: {
              Authorization: `Bearer ${currentSession.access_token}`,
            },
            body: formData,
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || "Error al subir el archivo");
          }

          const data = await response.json();
          const downloadUrl = `${window.location.origin}/download/${data.download_token}`;

          document.getElementById("download-link").href = downloadUrl;
          document.getElementById("download-link").textContent = downloadUrl;
          document.getElementById("expiry-info").textContent =
            `Expira: ${new Date(data.expires_at).toLocaleString()}`;
          document.getElementById("result").style.display = "block";
        } catch (err) {
          document.getElementById("error-msg").textContent = err.message;
          document.getElementById("error-msg").style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = "Subir archivo";
        }
      }

      // Función para copiar el enlace al portapapeles
      function copyLink() {
        const link = document.getElementById("download-link").textContent;
        navigator.clipboard.writeText(link).then(() => {
          alert("Enlace copiado");
        });
      }
    </script>
  </body>
</html>
