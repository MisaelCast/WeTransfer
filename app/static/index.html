<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeTransfer Clon</title>

     <!-- FAVICON (Rayo de Energía) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23004e5d'><path d='M11 21h-1l1-7H7.5c-.58 0-.57-.32-.38-.66.19-.34.05-.08.07-.12C8.48 10.94 10.42 7.54 13 3h1l-1 7h3.5c.49 0 .56.33.47.51l-.07.15C12.96 17.55 11 21 11 21z'/></svg>" />
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "#fdfdfd",
              surface: "#fdfdfd",
              "on-surface": "#0a0c0c",
              "on-surface-variant": "#444b4d",
              primary: "#004e5d",
              "primary-container": "#005a6b",
              "on-primary": "#ffffff",
              "surface-container-low": "#f8f9fa",
              "surface-container-highest": "#e8eaeb",
              outline: "#7b8487",
              "outline-variant": "#d1d9dd",
            },
            fontFamily: {
              headline: ["Space Grotesk"],
              body: ["Manrope"],
              label: ["Manrope"],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .cinematic-shadow {
        box-shadow:
          0 40px 80px -20px rgba(0, 78, 93, 0.15),
          0 20px 40px -20px rgba(0, 0, 0, 0.1);
      }
      .circular-focus {
        background: radial-gradient(
          circle at 30% 30%,
          #007c92 0%,
          #004e5d 100%
        );
        box-shadow:
          inset 0 0 30px rgba(255, 255, 255, 0.1),
          0 20px 60px rgba(0, 78, 93, 0.2);
      }
      /* Ocultamos la barra de scroll para un look más limpio */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d9dd;
        border-radius: 4px;
      }
    </style>
  </head>
  <body
    class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-hidden"
  >
    <nav
      class="w-full top-0 sticky z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30 shrink-0"
    >
      <div
        class="flex justify-between items-center px-8 py-4 max-w-[1440px] mx-auto"
      >
        <div
          class="text-base font-bold tracking-[0.1em] text-on-surface uppercase"
        >
          WeTransfer Clon
        </div>
        <div
          id="user-controls"
          class="hidden items-center space-x-4 text-xs font-medium"
        >
          <span
            id="user-email"
            class="text-on-surface-variant hidden md:inline"
          ></span>
          <button
            onclick="logout()"
            class="text-primary hover:text-primary-container transition-colors tracking-[0.05em] uppercase font-bold"
          >
            Cerrar Sesión
          </button>
        </div>
      </div>
    </nav>

    <main
      class="flex-grow flex flex-col items-center justify-center px-6 relative z-10 w-full h-full"
    >
      <div
        class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-12 items-center"
      >
        <div
          class="lg:col-span-5 space-y-6 order-2 lg:order-1 flex flex-col justify-center"
        >
          <div class="space-y-3">
            <span
              class="font-label text-[10px] tracking-[0.3em] uppercase text-primary font-extrabold flex items-center gap-2"
            >
              <span
                class="w-1.5 h-1.5 bg-primary rounded-full animate-pulse"
              ></span>
              Sistema Activo
            </span>
            <h1
              class="font-headline text-5xl lg:text-6xl font-bold tracking-tight text-on-surface leading-[0.95]"
            >
              Sube <br />
              <span class="text-primary-container">Comparte.</span>
            </h1>
          </div>
          <p
            class="text-on-surface-variant text-sm md:text-base max-w-sm leading-relaxed font-medium"
          >
            Sube tus archivos de hasta 50MB de forma segura. Los enlaces expiran
            automáticamente en 12 horas.
          </p>

          <div id="login-section" class="pt-2 space-y-3">
            <p
              class="font-label text-[10px] tracking-[0.2em] uppercase text-outline font-bold"
            >
              Paso 1: Identifícate para subir archivos
            </p>
            <button
              onclick="loginWithGoogle()"
              class="w-full md:w-auto inline-flex items-center justify-center px-6 py-3 bg-white border border-outline-variant rounded-xl text-on-surface font-bold text-xs tracking-[0.1em] uppercase hover:bg-surface-container-low transition-colors shadow-sm"
            >
              <img
                src="https://www.google.com/favicon.ico"
                alt="Google"
                class="w-4 h-4 mr-3"
              />
              Continuar con Google
            </button>
          </div>

          <div id="upload-section" class="hidden space-y-4 pt-2">
            <div id="action-container" class="space-y-4">
              <div id="file-info-container" class="hidden">
                <label
                  class="block font-label text-[9px] tracking-[0.15em] uppercase text-outline font-bold mb-1.5 ml-1"
                  >Archivo Seleccionado</label
                >
                <div
                  id="file-name"
                  class="px-4 py-3 bg-surface-container-low border border-primary/30 rounded-xl text-sm font-medium text-primary truncate"
                ></div>
              </div>

              <div
                id="error-msg"
                class="hidden text-red-600 text-xs font-bold bg-red-50 p-3 rounded-lg border border-red-200"
              ></div>

              <button
                id="upload-btn"
                onclick="uploadFile()"
                disabled
                class="group relative w-full md:w-auto inline-flex items-center justify-center px-8 py-4 font-headline font-bold text-white transition-all duration-300 rounded-xl overflow-hidden cinematic-shadow hover:scale-[1.02] active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
              >
                <div
                  class="absolute inset-0 bg-gradient-to-br from-primary via-primary-container to-primary transition-transform duration-500 group-hover:scale-110"
                ></div>
                <span
                  class="relative flex items-center space-x-2 tracking-[0.2em] uppercase text-xs"
                >
                  <span id="upload-btn-text">Iniciar Transferencia</span>
                  <span class="material-symbols-outlined text-sm font-bold"
                    >bolt</span
                  >
                </span>
              </button>
            </div>

            <div
              id="result-section"
              class="hidden p-5 bg-surface-container-low border border-outline-variant/50 rounded-xl space-y-3"
            >
              <label
                class="block font-label text-[9px] tracking-[0.15em] uppercase text-primary font-bold"
                >¡Transferencia Completada!</label
              >
              <a
                id="download-link"
                href="#"
                target="_blank"
                class="block text-primary font-medium text-sm break-all hover:underline"
              ></a>
              <div
                class="flex items-center justify-between mt-2 pt-3 border-t border-outline-variant/30"
              >
                <span
                  id="expiry-info"
                  class="text-[10px] text-outline font-medium"
                ></span>
                <div class="flex space-x-2">
                  <button
                    onclick="resetUpload()"
                    class="px-3 py-1.5 text-primary text-[10px] font-bold uppercase tracking-wider hover:bg-surface-container-highest rounded-lg transition-colors"
                  >
                    Nuevo
                  </button>
                  <button
                    onclick="copyLink()"
                    class="px-3 py-1.5 bg-primary text-white rounded-lg text-[10px] font-bold uppercase tracking-wider hover:bg-primary-container transition-colors shadow-sm"
                  >
                    Copiar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7 flex justify-center order-1 lg:order-2">
          <div
            class="relative w-72 h-72 lg:w-[400px] lg:h-[400px] flex items-center justify-center"
          >
            <div
              onclick="document.getElementById('file-input').click()"
              class="circular-focus w-full h-full rounded-full cinematic-shadow relative flex flex-col items-center justify-center text-white p-8 text-center group cursor-pointer border-[1px] border-white/30 overflow-hidden hover:brightness-110 transition-all"
            >
              <div class="relative z-10 space-y-4 pointer-events-none">
                <div
                  class="w-16 h-16 lg:w-24 lg:h-24 rounded-full bg-white/10 flex items-center justify-center mx-auto transition-transform duration-700 group-hover:scale-110 border border-white/30 backdrop-blur-md"
                >
                  <span
                    class="material-symbols-outlined text-3xl lg:text-5xl text-white"
                    >upload_file</span
                  >
                </div>
                <div class="space-y-1">
                  <h2
                    class="font-headline text-xl lg:text-3xl font-bold tracking-tight"
                  >
                    Drop File
                  </h2>
                  <p
                    class="font-label text-[9px] lg:text-[10px] tracking-[0.2em] uppercase font-medium text-white/70"
                  >
                    Click para seleccionar (Max 50MB)
                  </p>
                </div>
              </div>
            </div>

            <input
              type="file"
              id="file-input"
              class="hidden"
              onchange="handleFileSelect(this)"
            />
          </div>
        </div>
      </div>
    </main>

    <script>
      let SUPABASE_URL, SUPABASE_KEY, client;
      let currentSession = null;
      let selectedFile = null;
      const MAX_FILE_SIZE_MB = 50;

      async function loadConfig() {
        const res = await fetch("/config");
        const config = await res.json();
        SUPABASE_URL = config.supabase_url;
        SUPABASE_KEY = config.supabase_key;
        const { createClient } = supabase;
        client = createClient(SUPABASE_URL, SUPABASE_KEY);
        await init();
      }

      loadConfig();

      async function init() {
        const {
          data: { session },
        } = await client.auth.getSession();
        if (session) {
          currentSession = session;
          showUploadSection(session.user.email);
        }

        client.auth.onAuthStateChange((event, session) => {
          if (event === "SIGNED_IN" && session) {
            currentSession = session;
            showUploadSection(session.user.email);
          } else if (event === "SIGNED_OUT") {
            currentSession = null;
            showLoginSection();
          }
        });
      }

      function showUploadSection(email) {
        document.getElementById("login-section").classList.add("hidden");
        document.getElementById("upload-section").classList.remove("hidden");
        document.getElementById("user-controls").classList.remove("hidden");
        document.getElementById("user-controls").classList.add("flex");
        document.getElementById("user-email").textContent = email;
      }

      function showLoginSection() {
        document.getElementById("login-section").classList.remove("hidden");
        document.getElementById("upload-section").classList.add("hidden");
        document.getElementById("user-controls").classList.add("hidden");
        document.getElementById("user-controls").classList.remove("flex");
      }

      async function loginWithGoogle() {
        await client.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin },
        });
      }

      async function logout() {
        await client.auth.signOut();
      }

      function handleFileSelect(input) {
        selectedFile = input.files[0];
        const errorMsg = document.getElementById("error-msg");
        const btn = document.getElementById("upload-btn");
        const fileContainer = document.getElementById("file-info-container");

        errorMsg.classList.add("hidden");

        // Si el usuario selecciona un archivo nuevo, ocultamos el resultado y mostramos los controles
        document.getElementById("result-section").classList.add("hidden");
        document.getElementById("action-container").classList.remove("hidden");

        if (selectedFile) {
          // Validación frontend del peso del archivo
          if (selectedFile.size > MAX_FILE_SIZE_MB * 1024 * 1024) {
            errorMsg.textContent = `El archivo excede el límite de ${MAX_FILE_SIZE_MB}MB.`;
            errorMsg.classList.remove("hidden");
            fileContainer.classList.add("hidden");
            btn.disabled = true;
            selectedFile = null;
            return;
          }

          document.getElementById("file-name").textContent = selectedFile.name;
          fileContainer.classList.remove("hidden");
          btn.disabled = false;
        }
      }

      async function uploadFile() {
        if (!selectedFile || !currentSession) return;

        const btn = document.getElementById("upload-btn");
        const btnText = document.getElementById("upload-btn-text");
        const errorMsg = document.getElementById("error-msg");

        btn.disabled = true;
        btnText.textContent = "Procesando...";
        errorMsg.classList.add("hidden");

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
          const response = await fetch("/upload", {
            method: "POST",
            headers: { Authorization: `Bearer ${currentSession.access_token}` },
            body: formData,
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.detail || "Error al subir el archivo");
          }

          const data = await response.json();
          const downloadUrl = `${window.location.origin}/download/${data.download_token}`;

          // Preparamos los datos del enlace
          document.getElementById("download-link").href = downloadUrl;
          document.getElementById("download-link").textContent = downloadUrl;
          document.getElementById("expiry-info").textContent =
            `Expira: ${new Date(data.expires_at).toLocaleString()}`;

          // EL TRUCO ESTÁ AQUÍ: Ocultamos los botones de subida y mostramos la tarjeta de resultado
          document.getElementById("action-container").classList.add("hidden");
          document.getElementById("result-section").classList.remove("hidden");
        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.classList.remove("hidden");
        } finally {
          btnText.textContent = "Iniciar Transferencia";
        }
      }

      function copyLink() {
        const link = document.getElementById("download-link").textContent;
        navigator.clipboard
          .writeText(link)
          .then(() => alert("¡Enlace copiado al portapapeles!"));
      }

      // Nueva función para reiniciar la vista y subir otro archivo
      function resetUpload() {
        selectedFile = null;
        document.getElementById("file-input").value = ""; // Limpiar input
        document.getElementById("result-section").classList.add("hidden");
        document.getElementById("action-container").classList.remove("hidden");
        document.getElementById("file-info-container").classList.add("hidden");
        document.getElementById("upload-btn").disabled = true;
      }
    </script>
  </body>
</html>
